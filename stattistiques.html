<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques GODÉ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #4f8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .emoji { font-size: 60px; margin: 15px 0; }

        .go-btn {
            display: inline-block;
            padding: 22px 70px;
            background: #4f8cff;
            color: white;
            font-size: 28px;
            font-weight: 800;
            text-decoration: none;
            border-radius: 60px;
            margin: 25px 0;
            transition: all 0.3s;
            box-shadow: 0 10px 35px rgba(79,140,255,0.4);
            letter-spacing: 2px;
        }

        .go-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 45px rgba(79,140,255,0.6);
        }

        .info {
            color: #5a6d8a;
            font-size: 14px;
            line-height: 1.8;
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #1a2540;
        }

        .info span {
            color: #8ab4f8;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚔️ GODÉ</div>
        <div class="emoji">📊</div>
        
        <a href="http://92.133.24.95:8081/" class="go-btn">🚀 GO !</a>

        <div class="info">
            <span>🔍</span> Cherche un joueur<br>
            <span>📊</span> Voit ses stats : victoires, défaites, nuls<br>
            <span>⚔️</span> Découvre ses meilleurs adversaires<br>
            <span>👆</span> Clique pour le détail de chaque match
        </div>
    </div>
</body>
</html>
