<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques GODÉ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #4f8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #7b8aa8;
            font-size: 15px;
            margin-bottom: 40px;
        }

        .go-btn {
            display: inline-block;
            padding: 22px 70px;
            background: #4f8cff;
            color: white;
            font-size: 28px;
            font-weight: 800;
            text-decoration: none;
            border-radius: 60px;
            transition: all 0.3s;
            box-shadow: 0 10px 35px rgba(79,140,255,0.4);
            letter-spacing: 2px;
            cursor: pointer;
            border: none;
        }

        .go-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 45px rgba(79,140,255,0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚔️ GODÉ Statistiques</div>
        <div class="subtitle">Consultez les dernières statistiques mises à jour par le jeu</div>
        
        <button class="go-btn" onclick="openStats()">🚀 GO !</button>
    </div>

    <script>
        // ========== REMPLACER L'ANCIENNE PAGE ==========
        (function() {
            const CHANNEL_NAME = 'gode_stats_singleton';
            const bc = new BroadcastChannel(CHANNEL_NAME);
            const pageId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            
            bc.postMessage({ type: 'new_page', id: pageId });
            
            bc.onmessage = (event) => {
                if (event.data.type === 'new_page' && event.data.id !== pageId) {
                    console.log('🔄 Nouvelle instance détectée, fermeture de cette page...');
                    window.close();
                    setTimeout(() => {
                        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-family:sans-serif;font-size:1.5rem;text-align:center;background:#0a0e17;">Cette page a été remplacée.<br>Vous pouvez fermer cet onglet.</div>';
                    }, 500);
                }
                if (event.data.type === 'ping') {
                    bc.postMessage({ type: 'pong', id: pageId });
                }
            };
            
            setInterval(() => {
                bc.postMessage({ type: 'ping', id: pageId });
            }, 3000);
            
            window.addEventListener('beforeunload', () => {
                bc.postMessage({ type: 'closed', id: pageId });
                bc.close();
            });
            
            console.log('📄 Page stats unique activée | ID:', pageId);
        })();

        function openStats() {
            // Ouvrir dans le même onglet (remplace cette page)
            window.location.href = 'https://wafrik.github.io/stattistiques.html';
        }
    </script>
</body>
</html>
