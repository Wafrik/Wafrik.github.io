<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques GODÉ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { text-align: center; max-width: 400px; width: 100%; }
        .logo {
            font-size: 2.8rem; font-weight: 800;
            background: linear-gradient(135deg, #fff, #4f8cff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 10px;
        }
        .subtitle { color: #7b8aa8; font-size: 15px; margin-bottom: 40px; }
        .go-btn {
            display: inline-block; padding: 22px 70px; background: #4f8cff; color: white;
            font-size: 28px; font-weight: 800; text-decoration: none; border-radius: 60px;
            transition: all 0.3s; box-shadow: 0 10px 35px rgba(79,140,255,0.4); letter-spacing: 2px;
            cursor: pointer; border: none;
        }
        .go-btn:hover { transform: scale(1.05); box-shadow: 0 15px 45px rgba(79,140,255,0.6); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚔️ GODÉ Statistiques</div>
        <div class="subtitle">Redirection vers les statistiques...</div>
    </div>

</body>
